<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>Egmon — Gestionnaire de projets</title>
  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="logo.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f1117', light: '#161b22', lighter: '#1c2333', border: '#2d3748' },
            accent: { DEFAULT: '#6366f1', hover: '#818cf8', muted: '#4f46e5' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-surface text-gray-100 font-sans antialiased">

  <!-- Chargement initial auth -->
  <div id="auth-loading" class="min-h-screen flex items-center justify-center">
    <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Bannière configuration Supabase -->
  <div id="config-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-amber-500/10 border-b border-amber-500/30 px-4 py-2 text-center text-xs sm:text-sm text-amber-300 flex items-center justify-center gap-2">
    <svg class="w-4 h-4 shrink-0 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <span>Supabase non configuré — Modifiez <code class="bg-amber-500/20 px-1 rounded">js/config.js</code></span>
  </div>

  <div id="offline-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-red-500/10 border-b border-red-500/30 px-4 py-2 text-center text-xs sm:text-sm text-red-300 flex items-center justify-center gap-2">
    <svg class="w-4 h-4 shrink-0 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/></svg>
    <span>Hors ligne — Impossible de joindre Supabase. Vérifiez votre connexion.</span>
  </div>

  <!-- ═══ Page de connexion ═══ -->
  <div id="login-screen" class="hidden min-h-screen flex items-center justify-center p-4 sm:p-6">
    <!-- Contenu injecté par app.js -->
  </div>

  <!-- ═══ Application ═══ -->
  <div id="app-shell" class="hidden flex h-screen overflow-hidden has-banner:pt-10">
    <!-- Overlay mobile sidebar -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/60 z-20 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 max-w-[85vw] bg-surface-light border-r border-surface-border flex flex-col shrink-0">
      <div class="p-4 sm:p-5 border-b border-surface-border">
        <div class="flex items-center gap-3">
          <img src="logo.jpeg" alt="Egmon" class="app-logo shrink-0">
          <div class="min-w-0">
            <h1 class="font-semibold text-white text-sm leading-tight truncate">Egmon</h1>
            <p class="text-xs text-gray-500">Gestionnaire personnel</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 p-3 space-y-1 overflow-y-auto overscroll-contain">
        <a href="#dashboard" data-page="dashboard" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Dashboard
        </a>
        <a href="#projects" data-page="projects" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          Projets
        </a>
        <a href="#tasks" data-page="tasks" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          Tâches
        </a>
        <a href="#templates" data-page="templates" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm0 8a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg>
          Templates
        </a>
        <a href="#resources" data-page="resources" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          Ressources
        </a>
        <a href="#notes" data-page="notes" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
          <span class="truncate">Notes techniques</span>
        </a>
        <a href="#ideas" data-page="ideas" class="nav-link">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          Idées
        </a>
      </nav>

      <div class="p-3 sm:p-4 border-t border-surface-border space-y-3">
        <div class="flex items-center gap-3 px-2">
          <div id="user-avatar" class="w-8 h-8 rounded-full bg-accent/20 text-accent-hover flex items-center justify-center text-sm font-semibold shrink-0">?</div>
          <div class="min-w-0 flex-1">
            <p id="user-email" class="text-xs text-gray-400 truncate">—</p>
          </div>
        </div>
        <button id="btn-logout" class="nav-link w-full text-red-400 hover:text-red-300 hover:bg-red-500/10">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Déconnexion
        </button>
      </div>
    </aside>

    <!-- Contenu principal -->
    <main class="flex-1 flex flex-col overflow-hidden min-w-0">
      <header class="min-h-14 border-b border-surface-border bg-surface-light flex items-center justify-between gap-3 px-4 sm:px-6 py-3 shrink-0">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
          <button id="menu-toggle" class="lg:hidden p-2 -ml-1 rounded-lg hover:bg-surface-lighter text-gray-400 shrink-0" aria-label="Menu">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h2 id="page-title" class="text-base sm:text-lg font-semibold text-white truncate">Dashboard</h2>
        </div>
        <div id="header-actions" class="header-actions shrink-0"></div>
      </header>

      <div id="page-content" class="flex-1 overflow-y-auto overflow-x-hidden p-4 sm:p-6 overscroll-contain">
        <div class="flex items-center justify-center h-full min-h-[200px]">
          <div class="text-center">
            <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-gray-500 text-sm">Chargement...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 flex items-center justify-center p-4 sm:p-6">
    <div id="modal" class="modal-panel bg-surface-light border border-surface-border rounded-xl w-full max-w-md sm:max-w-lg shadow-2xl">
      <div class="modal-header flex items-center justify-between p-4 sm:p-5 border-b border-surface-border">
        <h3 id="modal-title" class="text-base sm:text-lg font-semibold text-white pr-4"></h3>
        <button id="modal-close" class="p-2 rounded-lg hover:bg-surface-lighter text-gray-400 hover:text-white transition-colors shrink-0" aria-label="Fermer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body p-4 sm:p-5"></div>
      <div id="modal-footer" class="modal-footer p-4 sm:p-5 border-t border-surface-border"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container fixed z-50 space-y-2"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
